name: Sheater-CI

on:
  push:
    branches:
      - main

jobs:
  # ==============================
  # OpenAPI / Protocol Buffers生成
  # ==============================
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Install code generation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.7.0
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.2

      - name: Generate code
        run: |
          oapi-codegen -config openapi/cfg.yml openapi/main.yml
          protoc --go_out=auth --go-grpc_out=auth proto/auth.proto
          protoc --proto_path=proto --go_out=api --go-grpc_out=api proto/auth.proto

      - name: Upload generated code
        uses: actions/upload-artifact@v4
        with:
          name: generated-code
          path: |
            api/interfaces/handler/api.gen.go
            api/interfaces/grpc/pb
            auth/interfaces/grpc/pb

  # ==============================
  # テスト
  # ==============================
  test:
    runs-on: ubuntu-latest
    needs: generate
    strategy:
      matrix:
        service: [api, auth]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: .

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: go test ./...

  # ==============================
  # ビルド & プッシュ
  # ==============================
  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
      actions: write
    strategy:
      matrix:
        service: [api, auth]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: .

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=${{ matrix.service }}-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          target: runner
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==============================
  # manifestsのタグ更新
  # ==============================
  update-manifests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout manifests
        uses: actions/checkout@v4
        with:
          repository: CommitUpp/k3s-manifests
          token: ${{ secrets.MANIFESTS_TOKEN }}

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tags
        run: |
          API_TAG="api-${GITHUB_SHA::7}"
          AUTH_TAG="auth-${GITHUB_SHA::7}"

          (cd apps/sheater/api/overlays/prod && \
            kustomize edit set image \
            ghcr.io/${{ github.repository }}=ghcr.io/${{ github.repository }}:"${API_TAG}")

          (cd apps/sheater/auth/overlays/prod && \
            kustomize edit set image \
            ghcr.io/${{ github.repository }}=ghcr.io/${{ github.repository }}:"${AUTH_TAG}")

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git commit -m "ci: update image tags for ${GITHUB_SHA::7}"
          git push
