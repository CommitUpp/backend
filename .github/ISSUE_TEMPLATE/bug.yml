name: バグ修正
description: 不具合を報告・修正するIssue
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: bug
    attributes:
      label: 不具合内容
      placeholder: 何が起きたか
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
    validations:
      required: true