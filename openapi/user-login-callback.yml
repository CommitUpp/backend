post:
  summary: Google認証後のコールバックAPI
  operationId: loginCallback
  security:
    - SupabaseAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/LoginCallbackRequest'
  responses:
    '200':
      description: 認証成功
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LoginCallbackResponse'
    '400':
      description: リクエスト不正（バリデーションエラーなど）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BadRequestError'
    '401':
      description: 認証エラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UnauthorizedError'
    '500':
      description: サーバー内部エラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/InternalServerError'