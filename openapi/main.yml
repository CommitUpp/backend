openapi: 3.0.3
info:
  title: CommitUpp API
  version: 1.0.0

servers:
  - url: /api/v1

paths:
  /user/callback:
    $ref: './user-login-callback.yml'
  /user/logout:
    $ref: './user-logout.yml'

components:
  securitySchemes:
    SupabaseAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginCallbackResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string

    LogoutResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string

    BadRequestError:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    UnauthorizedError:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    InternalServerError:
      type: object
      required:
        - message
      properties:
        message:
          type: string
