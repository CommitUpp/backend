openapi: 3.0.3
info:
  title: CommitUpp API
  version: 1.0.0

servers:
  - url: /api/v1

paths:
  /user/callback:
    $ref: './user-login-callback.yml'
  /user/logout:
    $ref: './user-logout.yml'
  /movie/status:
    $ref: './movie-status.yml'

components:
  securitySchemes:
    SupabaseAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginCallbackResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string

    LogoutResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string

    UpdateMovieStatusRequest:
      type: object
      required:
        - movie_id
        - status
      properties:
        movie_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [watched, wanna_watch]

    UpdateMovieStatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: success

    BadRequestError:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    UnauthorizedError:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    InternalServerError:
      type: object
      required:
        - message
      properties:
        message:
          type: string
